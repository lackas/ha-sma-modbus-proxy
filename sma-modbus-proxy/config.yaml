name: SMA Modbus Proxy
version: "1.1.5"
slug: sma_modbus_proxy
description: >-
  Emulates an SMA SunSpec inverter via Modbus TCP using Home Assistant sensor data.
  Makes non-SunSpec inverters (like SMA STP X with SunSpec 700 only) discoverable
  by energy management systems that require SunSpec Model 103 (e.g., Viessmann Gridbox).
url: "https://github.com/lackas/ha-sma-modbus-proxy"
arch:
  - aarch64
  - amd64
  - armv7
init: true
host_network: true
hassio_api: true
homeassistant_api: true
options:
  port: 502
  ha_token: ""
  serial: 1234567890
  max_power_w: 12000
  sensor_power: "sensor.lackas_measurement_gridms_totw"
  sensor_current_l1: "sensor.lackas_measurement_gridms_a_phsa"
  sensor_current_l2: "sensor.lackas_measurement_gridms_a_phsb"
  sensor_current_l3: "sensor.lackas_measurement_gridms_a_phsc"
  sensor_voltage_l1: "sensor.lackas_measurement_gridms_phv_phsa"
  sensor_voltage_l2: "sensor.lackas_measurement_gridms_phv_phsb"
  sensor_voltage_l3: "sensor.lackas_measurement_gridms_phv_phsc"
  sensor_frequency: "sensor.lackas_measurement_gridms_hz"
  sensor_reactive: "sensor.lackas_measurement_gridms_totvar"
  sensor_yield_total: "sensor.lackas_measurement_metering_totwhout_pv"
  sensor_health: "sensor.lackas_measurement_operation_health"
  sensor_dc_i_a: "sensor.lackas_measurement_dcms_amp_0"
  sensor_dc_v_a: "sensor.lackas_measurement_dcms_vol_0"
  sensor_dc_w_a: "sensor.lackas_measurement_dcms_watt_0"
  sensor_dc_i_b: "sensor.lackas_measurement_dcms_amp_1"
  sensor_dc_v_b: "sensor.lackas_measurement_dcms_vol_1"
  sensor_dc_w_b: "sensor.lackas_measurement_dcms_watt_1"
schema:
  port: int
  ha_token: password?
  serial: int
  max_power_w: int
  sensor_power: str
  sensor_current_l1: str
  sensor_current_l2: str
  sensor_current_l3: str
  sensor_voltage_l1: str
  sensor_voltage_l2: str
  sensor_voltage_l3: str
  sensor_frequency: str
  sensor_reactive: str
  sensor_yield_total: str
  sensor_health: str
  sensor_dc_i_a: str
  sensor_dc_v_a: str
  sensor_dc_w_a: str
  sensor_dc_i_b: str
  sensor_dc_v_b: str
  sensor_dc_w_b: str
